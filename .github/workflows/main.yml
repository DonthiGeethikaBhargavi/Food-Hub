name: Build WAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Java
      uses: actions/setup-java@v2
      with:
        java-version: '8'
        distribution: 'adopt'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Rename WAR to ROOT.war (for Render deployment)
      run: |
        WAR_FILE=$(ls target/*.war | head -n 1)
        echo "Found WAR file: $WAR_FILE"
        mv "$WAR_FILE" target/ROOT.war

    - name: Upload WAR file (ROOT.war)
      uses: actions/upload-artifact@v4
      with:
        name: ROOT-WAR
        path: target/ROOT.war
